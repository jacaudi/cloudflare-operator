---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: cloudflarednsrecords.cloudflare.io
spec:
  group: cloudflare.io
  names:
    kind: CloudflareDNSRecord
    listKind: CloudflareDNSRecordList
    plural: cloudflarednsrecords
    singular: cloudflarednsrecord
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Record Name
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.currentContent
      name: Content
      type: string
    - jsonPath: .spec.proxied
      name: Proxied
      type: boolean
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CloudflareDNSRecord is the Schema for the cloudflarednsrecords
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CloudflareDNSRecord
            properties:
              content:
                description: |-
                  Content is the record content (IP address, hostname, etc.).
                  Mutually exclusive with DynamicIP.
                type: string
              dynamicIP:
                description: |-
                  DynamicIP enables automatic external IP resolution for this record.
                  Only valid for type A. Mutually exclusive with Content.
                type: boolean
              interval:
                default: 5m
                description: Interval is the reconciliation interval for drift detection.
                type: string
              name:
                description: Name is the DNS record name (e.g., "example.com", "sub.example.com").
                minLength: 1
                type: string
              priority:
                description: Priority is the record priority (used for MX and SRV
                  records).
                type: integer
              proxied:
                description: Proxied indicates whether the record is proxied through
                  Cloudflare.
                type: boolean
              secretRef:
                description: SecretRef references a Secret containing Cloudflare API
                  credentials.
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the Secret. Defaults to the dependent CR's own namespace
                      when empty.
                    type: string
                required:
                - name
                type: object
              srvData:
                description: |-
                  SRVData contains SRV-specific record data.
                  Required when Type is SRV.
                properties:
                  port:
                    description: Port is the target port.
                    maximum: 65535
                    minimum: 0
                    type: integer
                  priority:
                    description: Priority of the SRV record.
                    maximum: 65535
                    minimum: 0
                    type: integer
                  proto:
                    description: Proto is the SRV protocol.
                    enum:
                    - _tcp
                    - _udp
                    - _tls
                    type: string
                  service:
                    description: Service is the SRV service name (e.g., "_satisfactory").
                    type: string
                  target:
                    description: Target is the target hostname for the SRV record.
                    type: string
                  weight:
                    description: Weight of the SRV record.
                    maximum: 65535
                    minimum: 0
                    type: integer
                required:
                - port
                - priority
                - proto
                - service
                - target
                - weight
                type: object
              ttl:
                default: 1
                description: TTL is the time-to-live in seconds. Use 1 for automatic.
                minimum: 1
                type: integer
              type:
                description: Type is the DNS record type.
                enum:
                - A
                - AAAA
                - CNAME
                - SRV
                - MX
                - TXT
                - NS
                type: string
              zoneID:
                description: |-
                  ZoneID is the Cloudflare Zone ID.
                  Mutually exclusive with ZoneRef.
                minLength: 1
                type: string
              zoneRef:
                description: |-
                  ZoneRef references a CloudflareZone resource in the same namespace.
                  The controller resolves the zone ID from the referenced resource's status.
                  Mutually exclusive with ZoneID.
                properties:
                  name:
                    description: Name of the CloudflareZone resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the CloudflareZone. Defaults to the referencing CR's own
                      namespace when empty.
                    type: string
                required:
                - name
                type: object
            required:
            - name
            - secretRef
            - type
            type: object
          status:
            description: status defines the observed state of CloudflareDNSRecord
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentContent:
                description: CurrentContent is the current content/value of the DNS
                  record in Cloudflare.
                type: string
              lastSyncedAt:
                description: LastSyncedAt is the last time the record was successfully
                  synced.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recently observed generation
                  of the CR.
                format: int64
                type: integer
              recordID:
                description: RecordID is the Cloudflare DNS record ID.
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: one of zoneID or zoneRef is required
          rule: has(self.spec.zoneID) || has(self.spec.zoneRef)
        - message: zoneID and zoneRef are mutually exclusive
          rule: '!(has(self.spec.zoneID) && has(self.spec.zoneRef))'
    served: true
    storage: true
    subresources:
      status: {}
