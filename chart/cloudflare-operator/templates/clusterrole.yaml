apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudflare-operator
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
rules:
  # CloudflareOperator (own CRD)
  - apiGroups: ["cloudflare.io"]
    resources: ["cloudflareoperators", "cloudflareoperators/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Manage CRDs (install/upgrade five domain CRDs)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Manage Deployments for the zone/tunnel controllers
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read Secrets cluster-wide (per-CR credentialRef resolution)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Leader election lease in operator namespace
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Domain CRs — read for stale-CR sweep on bundle disable
  - apiGroups: ["cloudflare.io"]
    resources: ["cloudflarezones", "cloudflarezoneconfigs", "cloudflarednsrecords", "cloudflarerulesets", "cloudflaretunnels"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["cloudflare.io"]
    resources: ["cloudflarezones/status", "cloudflarezoneconfigs/status", "cloudflarednsrecords/status", "cloudflarerulesets/status", "cloudflaretunnels/status"]
    verbs: ["update", "patch"]
