apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudflare-operator
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudflare-operator
subjects:
  - kind: ServiceAccount
    name: cloudflare-operator
    namespace: {{ .Release.Namespace }}
