apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflare-operator
      app.kubernetes.io/component: meta-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflare-operator
        app.kubernetes.io/component: meta-operator
    spec:
      serviceAccountName: cloudflare-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - --mode=meta
            - --operator-namespace={{ .Values.namespace }}
            - --operator-image={{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
