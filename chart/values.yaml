---
# Cloudflare Operator Helm Chart
# Based on bjw-s app-template

# -- Global values
global: {}

# -- Container image configuration
image:
  repository: ghcr.io/jacaudi/cloudflare-operator
  # -- Overrides the image tag (default is the chart appVersion)
  tag: ""
  pullPolicy: IfNotPresent

# -- Controller/Deployment configuration
controller:
  # -- Number of replicas (for HA, use 2+ with leader election)
  replicas: 1
  strategy: Recreate

  # -- Default soft per-hostname topologySpreadConstraints applied when
  # replicas > 1 AND neither controller.affinity nor
  # controller.topologySpreadConstraints is set. To disable, leave both
  # empty (single-replica deployments don't benefit from spread). To
  # override the default, set controller.affinity or
  # controller.topologySpreadConstraints to your desired value — the
  # operator-injected default is replaced wholesale, never merged.
  topologySpreadConstraints: []

  # -- Affinity rules. When set, suppresses the default
  # topologySpreadConstraint above.
  affinity: {}

  # -- PodDisruptionBudget for the operator deployment. Created with
  # minAvailable:1 only when replicas > 1; ignored at replicas:1 because
  # a minAvailable:1 PDB on a single-replica deployment blocks all
  # voluntary disruptions, which is strictly worse than no PDB.
  podDisruptionBudget:
    enabled: true

# -- Leader election for HA (active-passive)
# When enabled with multiple replicas, only one instance processes resources
leaderElection:
  enabled: true

# -- Timezone for the container
timezone: UTC

# -- Resource limits and requests
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

# -- Service account configuration
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- RBAC configuration
rbac:
  # -- Enable RBAC resources
  enabled: true

# -- TXT ownership registry configuration.
# txtOwnerID must be set to activate annotation-driven sources
# (httproute_source, service_source).
registry:
  # TxtOwnerID identifies this operator instance in the external-dns-compatible
  # TXT ownership registry. REQUIRED to activate annotation-driven sources
  # (httproute_source, service_source). Two operator deployments against the
  # same zone MUST use different IDs.
  txtOwnerID: ""

  # TxtImportOwners is a list of external-dns owner IDs to read and adopt
  # records from during migration. The TXT is rewritten to our owner on
  # adoption; the underlying A/AAAA/CNAME stays in place.
  txtImportOwners: []

  # TxtPrefix prepends a label to TXT registry record names (e.g. "_owner-").
  # Must match any prior external-dns config when migrating.
  txtPrefix: ""

  # TxtSuffix appends a label to TXT registry record names. Must match any
  # prior external-dns config when migrating.
  txtSuffix: ""

  # TxtWildcardReplacement replaces the literal "*" in wildcard hostnames when
  # building TXT registry record names. Must match any prior external-dns
  # config when migrating.
  txtWildcardReplacement: ""

# -- Secret cache filter (security + memory).
# Label selector applied to corev1.Secret in the manager cache. The
# operator's tunnel credentials Secret is auto-labeled; user-supplied
# credential Secrets MUST carry this label or the operator cannot read
# them. Empty string disables the filter (caches every Secret in scope
# of RBAC) — useful for staged migrations.
secretCacheLabelSelector: "cloudflare.io/managed=true"

# -- Metrics and monitoring configuration
metrics:
  serviceMonitor:
    # -- Enable ServiceMonitor for Prometheus Operator
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s
