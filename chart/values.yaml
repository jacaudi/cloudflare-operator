# Facade values for the cloudflare-operator chart. The HelmRelease author
# sets these; templates/_helpers.tpl maps them onto the bjw-s common schema.
image:
  repository: ghcr.io/jacaudi/cloudflare-operator
  tag: ""          # empty → .Chart.AppVersion
  pullPolicy: IfNotPresent

# Override-only / informational. bjw-s common renders the ServiceAccount and
# Deployment in .Release.Namespace, so that is the single source of truth for
# the operator's namespace. Leave this empty (the intended path) and install
# into the target namespace via `helm --namespace` / Flux HelmRelease
# targetNamespace. If set non-empty it MUST equal the release namespace — a
# divergent value fails the install fast (templates/common.yaml guard) rather
# than silently binding RBAC to a non-existent ServiceAccount.
namespace: ""

# CRD lifecycle. install: render the 5 bundle CRDs as chart templates at all.
# keep: stamp helm.sh/resource-policy: keep so they survive `helm uninstall`
# (data-safety default — matches design §4's original hard-coded behavior).
crds:
  install: true
  keep: true

# Which bundle controllers the meta-operator spawns.
controllers:
  zone:
    enabled: true
    replicas: 1
    logLevel: info
  tunnel:
    enabled: false
    replicas: 1
    logLevel: info
    # cloudflared connector resources seeded into every CloudflareTunnel this
    # operator auto-creates from a Gateway annotation (standard k8s
    # ResourceRequirements). Empty {} (default) = no requests/limits — exact
    # current behavior. Manually-declared CloudflareTunnel CRs are unaffected.
    connector:
      resources: {}

# Operator-level default credentials — meta-operator env (CLOUDFLARE_API_TOKEN
# / CLOUDFLARE_ACCOUNT_ID) and the coordinates it propagates to spawned
# controllers, all via valueFrom.secretKeyRef from this existing Secret.
credentials:
  existingSecret: ""
  tokenKey: token
  accountIDKey: accountID

# Controller-manager leader election (controller-runtime Lease-based HA).
leaderElection:
  enabled: true

observability:
  metrics:
    serviceMonitor:
      enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
