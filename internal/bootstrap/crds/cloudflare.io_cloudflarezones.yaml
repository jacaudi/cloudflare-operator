---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: cloudflarezones.cloudflare.io
spec:
  group: cloudflare.io
  names:
    kind: CloudflareZone
    listKind: CloudflareZoneList
    plural: cloudflarezones
    singular: cloudflarezone
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Domain
      type: string
    - jsonPath: .status.zoneID
      name: Zone ID
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CloudflareZone is the Schema for the cloudflarezones API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CloudflareZoneSpec defines the desired state of a Cloudflare
              Zone.
            properties:
              cloudflare:
                description: |-
                  Cloudflare overrides the top-level credential + account from the
                  CloudflareOperator CR. Per Foundation §5 the token and accountID
                  are inherited or overridden as a unit; CEL on this CRD must reject
                  setting only one. Omitted entirely → top-level default applies.
                properties:
                  accountID:
                    description: AccountID is the Cloudflare account ID this credential
                      scopes to.
                    minLength: 1
                    type: string
                  tokenSecretRef:
                    description: TokenSecretRef points at the Secret carrying the
                      Cloudflare API token.
                    properties:
                      key:
                        default: token
                        description: Key inside the Secret holding the Cloudflare
                          API token. Defaults to "token".
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the Secret. Defaults to the referencing
                          CR's namespace.
                        type: string
                    required:
                    - name
                    type: object
                  txtRegistryKeySecretRef:
                    description: |-
                      TxtRegistryKeySecretRef references a Secret containing an AES-256 key
                      used to encrypt the TXT-registry ownership records. Only meaningful on
                      the top-level CloudflareOperator; ignored on per-CR overrides. When
                      unset, the TXT registry runs in plaintext mode (encryption is opt-in).
                    properties:
                      key:
                        default: token
                        description: Key inside the Secret holding the Cloudflare
                          API token. Defaults to "token".
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the Secret. Defaults to the referencing
                          CR's namespace.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - accountID
                - tokenSecretRef
                type: object
              deletionPolicy:
                default: Retain
                description: |-
                  DeletionPolicy controls what happens when the CR is deleted.
                  "Retain" (default) leaves the zone in Cloudflare; "Delete" removes it.
                enum:
                - Retain
                - Delete
                type: string
              interval:
                default: 30m
                description: Interval is the reconciliation interval.
                type: string
              name:
                description: Name is the domain name to onboard (e.g., "example.com").
                minLength: 1
                type: string
              paused:
                description: Paused indicates whether the zone is paused (not serving
                  traffic through Cloudflare).
                type: boolean
              type:
                default: full
                description: |-
                  Type is the zone type. "full" means Cloudflare is authoritative DNS;
                  "partial" is CNAME setup; "secondary" mirrors an upstream master.
                  Immutable after creation.
                enum:
                - full
                - partial
                - secondary
                type: string
            required:
            - deletionPolicy
            - name
            - type
            type: object
          status:
            description: CloudflareZoneStatus defines the observed state of a CloudflareZone.
            properties:
              activatedOn:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncedAt:
                format: date-time
                type: string
              nameServers:
                items:
                  type: string
                type: array
              observedGeneration:
                format: int64
                type: integer
              originalNameServers:
                items:
                  type: string
                type: array
              originalRegistrar:
                type: string
              phase:
                allOf:
                - enum:
                  - Ready
                  - Reconciling
                  - Error
                  - Pending
                - enum:
                  - Ready
                  - Reconciling
                  - Error
                  - Pending
                description: Phase is a coarse summary derived from the Ready condition
                  (Foundation §8).
                type: string
              status:
                description: Status is the zone status in Cloudflare (initializing,
                  pending, active, moved).
                type: string
              zoneID:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
