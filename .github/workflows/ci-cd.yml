---
# CI/CD Pipeline for Cloudflare Operator
# Runs linting, testing, container builds, and image scanning
name: CI/CD

"on":
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one release at a time - queue subsequent runs
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # Lint YAML and Go code
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.3
    permissions:
      contents: read
    with:
      yaml: true
      go: true
      go-version: '1.26'

  # Run Go tests with coverage
  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.20.3
    permissions:
      contents: read
    with:
      test-framework: 'go'
      go-version: '1.26'
      coverage: true
      coverage-threshold: 40
      test-packages: './api/... ./internal/... ./cmd/...'

  envtest:
    name: Envtest Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run make test (unit + envtest)
        run: make test

  # Build metadata for version stamping (short commit + ISO build date).
  meta:
    name: Build Metadata
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.m.outputs.commit }}
      date: ${{ steps.m.outputs.date }}
    steps:
      - id: m
        env:
          SHA: ${{ github.sha }}
        run: |
          echo "commit=${SHA:0:7}" >> "${GITHUB_OUTPUT}"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

  # Create semantic version and GitHub release (main branch only)
  release:
    needs: [lint, test, envtest]
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@v0.20.3
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      use-github-app: true
      # Pin @9: conventionalcommits v10 silently emits empty release notes under semantic-release v24.
      extra-plugins: '@semantic-release/changelog @semantic-release/git @semantic-release/exec conventional-changelog-conventionalcommits@9'
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  # Build multi-arch container images
  container:
    needs: [release, meta]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@v0.20.3
    permissions:
      contents: read
      packages: write
    with:
      image-name: ${{ github.repository }}
      platforms: 'linux/amd64,linux/arm64'
      version: ${{ needs.release.outputs.new-release-version }}
      build-args: |
        VERSION=${{ needs.release.outputs.new-release-version-v }}
        COMMIT=${{ needs.meta.outputs.commit }}
        DATE=${{ needs.meta.outputs.date }}
      tags: |
        ghcr.io/${{ github.repository }}:${{ needs.release.outputs.new-release-version-v }}
        ghcr.io/${{ github.repository }}:latest

  # Publish Helm chart to OCI registry (runs after container build so the
  # chart's appVersion always points at an image tag that exists in the
  # registry)
  helm:
    needs: [release, container]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-helm-publish.yml@v0.20.3
    permissions:
      contents: read
      packages: write
    with:
      chart-name: cloudflare-operator
      chart-path: chart
      repository: ${{ github.repository_owner }}/charts
      version: ${{ needs.release.outputs.new-release-version-v }}
      registry: ghcr.io
      registry-username: ${{ github.repository_owner }}
