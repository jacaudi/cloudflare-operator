---
# CI/CD Pipeline for Cloudflare Operator
# Runs linting, testing, container builds, and image scanning
name: CI/CD

"on":
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one release at a time - queue subsequent runs
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # Lint YAML and Go code
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.1
    permissions:
      contents: read
    with:
      yaml: true
      go: true
      go-version: '1.26'

  # Run Go tests with coverage
  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.20.1
    permissions:
      contents: read
    with:
      test-framework: 'go'
      go-version: '1.26'
      coverage: true
      coverage-threshold: 40
      test-packages: './internal/controller/... ./internal/cloudflare/... ./internal/ipresolver/... ./internal/status/... ./api/...'

  # Create semantic version and GitHub release (main branch only)
  release:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@v0.20.1
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      use-github-app: true
      extra-plugins: '@semantic-release/changelog @semantic-release/git @semantic-release/exec'
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  # Build multi-arch container images
  container:
    needs: [release]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@v0.20.1
    permissions:
      contents: read
      packages: write
    with:
      image-name: ${{ github.repository }}
      platforms: 'linux/amd64,linux/arm64'
      version: ${{ needs.release.outputs.new-release-version }}
      tags: |
        ghcr.io/${{ github.repository }}:${{ needs.release.outputs.new-release-version-v }}
        ghcr.io/${{ github.repository }}:latest

  # Publish Helm chart to OCI registry (runs after container build so the
  # chart's appVersion always points at an image tag that exists in the
  # registry)
  helm:
    needs: [release, container]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-helm-publish.yml@v0.20.1
    permissions:
      contents: read
      packages: write
    with:
      chart-name: cloudflare-operator
      chart-path: chart
      repository: ${{ github.repository_owner }}/charts
      version: ${{ needs.release.outputs.new-release-version-v }}
      registry: ghcr.io
      registry-username: ${{ github.repository_owner }}
