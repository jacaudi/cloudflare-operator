---
# Pull Request Validation
# Fast feedback on PRs: lint and test.
# Container image builds run only on the post-release CI/CD pipeline.
name: PR Validation

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write


jobs:
  lint:
    name: Lint Code
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.3
    with:
      yaml: true
      go: true
      go-version: '1.26'
      helm: true
      helm-chart-path: 'chart'

  test:
    name: Run Tests
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.20.3
    with:
      test-framework: 'go'
      go-version: '1.26'
      coverage: true
      coverage-threshold: 40
      test-packages: './api/... ./internal/... ./cmd/...'

  envtest:
    name: Envtest Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
      - name: Run make test (unit + envtest)
        run: make test
