---
# Security rules — custom rules in the http_request_firewall_custom phase
# entrypoint (Cloudflare dashboard: Security → Custom rules).
apiVersion: cloudflare.io/v1alpha1
kind: CloudflareRuleset
metadata:
  name: security-rules
spec:
  zoneID: "<zone-id>"
  name: "Custom security rules"
  description: "Zone-level custom security rules"
  phase: "http_request_firewall_custom"
  interval: 30m
  secretRef:
    name: cloudflare-api-token
  rules:
    - action: block
      expression: '(cf.client.bot) or (cf.threat_score gt 14)'
      description: "Block bots and high threat scores"
      enabled: true
    - action: block
      expression: '(not ip.geoip.country in {"CA" "US" "GB"})'
      description: "Block non-allowed countries"
      enabled: true
    - action: skip
      expression: '(ip.src in {192.0.2.0/24})'
      description: "Allowlist office IPs"
      enabled: true
      # logging.enabled forces logging on for `skip`, where Cloudflare's default
      # is off — useful when you want to audit which traffic was allowlisted.
      # Omit the logging block entirely if you want default behavior.
      logging:
        enabled: true
---
# Same ruleset, but referencing a CloudflareZone by name instead of a raw zoneID.
apiVersion: cloudflare.io/v1alpha1
kind: CloudflareRuleset
metadata:
  name: security-rules-with-zoneref
spec:
  zoneRef:
    name: my-zone
  name: "Custom security rules"
  phase: "http_request_firewall_custom"
  interval: 30m
  secretRef:
    name: cloudflare-api-token
  rules:
    - action: block
      expression: '(cf.client.bot)'
      description: "Block bots"
      enabled: true
