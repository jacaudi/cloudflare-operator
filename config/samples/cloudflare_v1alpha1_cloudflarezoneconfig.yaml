# Required token scopes per group:
#   ssl / security / performance / network: Zone:Zone Settings:Edit
#   botManagement:                           Zone:Bot Management:Edit (paid plan)
#
# Groups you don't configure won't be touched. A failure on one group
# (e.g., a 403 on botManagement) won't block the others — see
# .status.conditions for per-group state.
apiVersion: cloudflare.io/v1alpha1
kind: CloudflareZoneConfig
metadata:
  name: zone-settings
spec:
  zoneID: "<zone-id>"
  interval: 30m
  secretRef:
    name: cloudflare-api-token
  ssl:
    mode: "full"
    minTLSVersion: "1.2"
    tls13: "zrt"
    alwaysUseHTTPS: "on"
    automaticHTTPSRewrites: "on"
    opportunisticEncryption: "on"
  security:
    securityLevel: "medium"
    challengeTTL: 1800
    browserCheck: "on"
    emailObfuscation: "on"
  performance:
    cacheLevel: "aggressive"
    browserCacheTTL: 14400
    brotli: "on"
    earlyHints: "on"
    http2: "on"
    http3: "on"
    minify:
      css: "on"
      html: "on"
      js: "on"
  network:
    ipv6: "on"
    websockets: "on"
    ipGeolocation: "on"
    opportunisticOnion: "on"
  botManagement:
    enableJS: true
    fightMode: true
---
# Using zoneRef instead of zoneID
apiVersion: cloudflare.io/v1alpha1
kind: CloudflareZoneConfig
metadata:
  name: zone-settings-with-zoneref
spec:
  zoneRef:
    name: my-zone
  interval: 30m
  secretRef:
    name: cloudflare-api-token
  ssl:
    mode: "full"
    alwaysUseHTTPS: "on"
