---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: cloudflarezones.cloudflare.io
spec:
  group: cloudflare.io
  names:
    kind: CloudflareZone
    listKind: CloudflareZoneList
    plural: cloudflarezones
    singular: cloudflarezone
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Domain
      type: string
    - jsonPath: .status.zoneID
      name: Zone ID
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CloudflareZone is the Schema for the cloudflarezones API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CloudflareZone
            properties:
              deletionPolicy:
                default: Retain
                description: |-
                  DeletionPolicy controls what happens when the CR is deleted.
                  "Retain" (default) leaves the zone in Cloudflare.
                  "Delete" removes the zone from Cloudflare.
                enum:
                - Retain
                - Delete
                type: string
              interval:
                default: 30m
                description: Interval is the reconciliation interval.
                type: string
              name:
                description: Name is the domain name to onboard (e.g., "example.com").
                minLength: 1
                type: string
              paused:
                description: Paused indicates whether the zone is paused (not serving
                  traffic through Cloudflare).
                type: boolean
              secretRef:
                description: SecretRef references a Secret containing Cloudflare API
                  credentials.
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the Secret. Defaults to the dependent CR's own namespace
                      when empty.
                    type: string
                required:
                - name
                type: object
              type:
                default: full
                description: |-
                  Type is the zone type. "full" means Cloudflare is the authoritative DNS.
                  "partial" is a CNAME setup. Immutable after creation.
                enum:
                - full
                - partial
                - secondary
                type: string
            required:
            - name
            - secretRef
            type: object
          status:
            description: status defines the observed state of CloudflareZone
            properties:
              activatedOn:
                description: ActivatedOn is the time the zone became active.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncedAt:
                description: LastSyncedAt is the last time the zone was successfully
                  synced.
                format: date-time
                type: string
              nameServers:
                description: |-
                  NameServers are the Cloudflare-assigned nameservers for this zone.
                  Update your registrar's NS records to these values to activate the zone.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recently observed generation.
                format: int64
                type: integer
              originalNameServers:
                description: OriginalNameServers are the nameservers before migration
                  to Cloudflare.
                items:
                  type: string
                type: array
              originalRegistrar:
                description: OriginalRegistrar is the registrar at the time of onboarding.
                type: string
              status:
                description: Status is the zone status in Cloudflare (initializing,
                  pending, active, moved).
                type: string
              zoneID:
                description: ZoneID is the Cloudflare Zone ID.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
