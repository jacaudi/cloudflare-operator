---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: cloudflarerulesets.cloudflare.io
spec:
  group: cloudflare.io
  names:
    kind: CloudflareRuleset
    listKind: CloudflareRulesetList
    plural: cloudflarerulesets
    singular: cloudflareruleset
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Ruleset Name
      type: string
    - jsonPath: .spec.phase
      name: Ruleset Phase
      type: string
    - jsonPath: .status.ruleCount
      name: Rules
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v2alpha1
    schema:
      openAPIV3Schema:
        description: CloudflareRuleset is the Schema for the cloudflarerulesets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CloudflareRulesetSpec defines the desired state of CloudflareRuleset.
            properties:
              cloudflare:
                description: Cloudflare overrides the top-level credential + account.
                properties:
                  accountID:
                    description: |-
                      AccountID is the Cloudflare account ID this credential scopes to.
                      Exactly one of accountID or accountIDSecretRef must be set.
                    minLength: 1
                    type: string
                  accountIDSecretRef:
                    description: |-
                      AccountIDSecretRef resolves the Cloudflare account ID from a Secret
                      instead of the inline accountID (exactly one of the two must be set).
                      NOTE: SecretReference.Key defaults to "token"; set key: accountID
                      explicitly (the account ID is typically a distinct key in the same
                      Secret as the API token).
                    properties:
                      key:
                        default: token
                        description: Key inside the Secret holding the Cloudflare
                          API token. Defaults to "token".
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the Secret. Defaults to the referencing
                          CR's namespace.
                        type: string
                    required:
                    - name
                    type: object
                  tokenSecretRef:
                    description: TokenSecretRef points at the Secret carrying the
                      Cloudflare API token.
                    properties:
                      key:
                        default: token
                        description: Key inside the Secret holding the Cloudflare
                          API token. Defaults to "token".
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the Secret. Defaults to the referencing
                          CR's namespace.
                        type: string
                    required:
                    - name
                    type: object
                  txtRegistryKeySecretRef:
                    description: |-
                      TxtRegistryKeySecretRef references a Secret holding an AES-256 key
                      (exactly 32 bytes, under the SecretReference.Key entry, default "key").
                      When set, the DNSRecord reconciler encrypts TXT companion-registry
                      payloads with AES-256-GCM (wire format v1:<base64-nonce>:<base64-ct>);
                      when unset, companions are written as plaintext JSON. The read side
                      auto-detects either form. See the TXT-registry design for the full
                      contract (companion naming, ownership verification, observe mode).
                    properties:
                      key:
                        default: token
                        description: Key inside the Secret holding the Cloudflare
                          API token. Defaults to "token".
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the Secret. Defaults to the referencing
                          CR's namespace.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - tokenSecretRef
                type: object
                x-kubernetes-validations:
                - message: exactly one of accountID or accountIDSecretRef must be
                    set
                  rule: '(has(self.accountID) && self.accountID.size() > 0) ? !has(self.accountIDSecretRef)
                    : has(self.accountIDSecretRef)'
              description:
                description: Description is an informative description of the ruleset.
                type: string
              interval:
                default: 30m
                description: Interval is the reconciliation interval.
                type: string
              name:
                description: Name is the human-readable name for the ruleset.
                minLength: 1
                type: string
              phase:
                description: |-
                  Phase is the Cloudflare ruleset entrypoint phase. This is the
                  Cloudflare API surface (not the operator's lifecycle Phase).
                enum:
                - http_request_firewall_custom
                - http_request_firewall_managed
                - http_request_late_transform
                - http_request_redirect
                - http_request_transform
                - http_response_headers_transform
                - http_response_firewall_managed
                - http_config_settings
                - http_custom_errors
                - http_ratelimit
                - http_request_cache_settings
                - http_request_origin
                - http_request_dynamic_redirect
                - http_response_compression
                type: string
              rules:
                description: Rules is the list of rules in the ruleset.
                items:
                  description: RulesetRuleSpec defines a single rule within a Cloudflare
                    Ruleset.
                  properties:
                    action:
                      description: Action is the action to perform when the rule matches.
                      enum:
                      - block
                      - challenge
                      - js_challenge
                      - managed_challenge
                      - log
                      - skip
                      - execute
                      - redirect
                      - rewrite
                      - route
                      - score
                      - serve_error
                      - set_cache_settings
                      - set_config
                      - compress_response
                      - force_connection_close
                      type: string
                    actionParameters:
                      description: ActionParameters contains action-specific parameters
                        as free-form JSON.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    description:
                      description: Description is an informative description of the
                        rule.
                      type: string
                    enabled:
                      default: true
                      description: Enabled indicates whether the rule is active.
                      type: boolean
                    expression:
                      description: Expression is the filter expression for the rule.
                      minLength: 1
                      type: string
                    logging:
                      description: |-
                        Logging configures per-rule logging behavior. Sibling of ActionParameters
                        in the Cloudflare API; do not encode logging via ActionParameters.
                      properties:
                        enabled:
                          description: |-
                            Enabled enables per-rule logging.

                            Note: due to Cloudflare API semantics, setting Enabled=false is
                            indistinguishable from omitting the Logging block entirely. The
                            operator normalizes both forms to "logging unset" on write to avoid
                            spurious drift loops. To enable logging, set true.
                          type: boolean
                      type: object
                  required:
                  - action
                  - expression
                  type: object
                minItems: 1
                type: array
              zoneID:
                description: ZoneID is the Cloudflare Zone ID. Mutually exclusive
                  with ZoneRef.
                minLength: 1
                type: string
              zoneRef:
                description: ZoneRef references a CloudflareZone CR. Mutually exclusive
                  with ZoneID.
                properties:
                  name:
                    description: Name of the CloudflareZone CR.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the CloudflareZone CR. Defaults to the
                      referencing CR's namespace.
                    type: string
                required:
                - name
                type: object
            required:
            - name
            - phase
            - rules
            type: object
          status:
            description: CloudflareRulesetStatus defines the observed state of CloudflareRuleset.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconcileToken:
                description: |-
                  LastReconcileToken is the controller-owned ack of the most recent
                  cloudflare.io/reconcile-at annotation value the controller has
                  observed. The prelude in internal/reconcile.ForceReconcileRequested
                  compares this against the live annotation; mismatch forces a full
                  re-check this reconcile (bypassing the change-detection short-
                  circuit). The operator NEVER modifies the annotation itself — only
                  this status field — so admin force-triggers are not auto-cleared.
                type: string
              lastSyncedAt:
                description: LastSyncedAt is the last time the ruleset was successfully
                  synced.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recently observed generation
                  of the CR.
                format: int64
                type: integer
              phase:
                default: Pending
                description: |-
                  Phase is a coarse summary of the reconciliation state. See
                  Phase for the enum values.
                enum:
                - Ready
                - Reconciling
                - Error
                - Pending
                type: string
              ruleCount:
                description: RuleCount is the number of rules in the ruleset.
                type: integer
              rulesetID:
                description: RulesetID is the Cloudflare Ruleset ID.
                type: string
            type: object
        type: object
        x-kubernetes-validations:
        - message: one of zoneID or zoneRef is required
          rule: has(self.spec.zoneID) || has(self.spec.zoneRef)
        - message: zoneID and zoneRef are mutually exclusive
          rule: '!(has(self.spec.zoneID) && has(self.spec.zoneRef))'
    served: true
    storage: true
    subresources:
      status: {}
