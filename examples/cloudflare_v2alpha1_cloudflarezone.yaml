# CloudflareZone — onboard a domain as a Cloudflare zone.
#
# Applying this CR ensures the domain is registered as a zone on the
# Cloudflare account configured for the operator. The zone's Cloudflare-
# assigned ID is published on Status once the loop converges, where
# downstream CRs (CloudflareZoneConfig, CloudflareRuleset,
# CloudflareDNSRecord) can resolve it via `zoneRef.name`.
#
# DeletionPolicy is the safety knob: "Retain" (default) leaves the zone in
# Cloudflare when the CR is deleted; "Delete" actively removes it.
#
# === Credentials (operator-level default) ===
# This example omits `spec.cloudflare` and inherits the operator-level
# default credentials configured at chart install time:
#
#   credentials:
#     existingSecret: cloudflare-operator-credentials
#     tokenKey: apiToken
#     accountIDKey: accountID
#
# The Secret must carry the `app.kubernetes.io/part-of: cloudflare-operator`
# label and store the API token + account ID under the configured keys. To
# override credentials per-CR instead, see the `spec.cloudflare` block in
# `cloudflare_v2alpha1_cloudflarednsrecord.yaml`. The full resolution order
# lives in `docs/credentials.md`.
apiVersion: cloudflare.io/v2alpha1
kind: CloudflareZone
metadata:
  name: example-com
  namespace: default
spec:
  # The domain to onboard. Must be a valid registrable domain.
  name: example.com

  # full      — Cloudflare is authoritative DNS (most common)
  # partial   — CNAME setup; Cloudflare proxies via partial DNS
  # secondary — zone mirrors an upstream master
  # Immutable after the zone is created in Cloudflare.
  type: full

  # Retain leaves the zone in Cloudflare on CR delete (default + safest).
  # Switch to Delete only when you want destructive cleanup semantics.
  deletionPolicy: Retain

  # Reconciliation interval. Drives drift detection between this CR and
  # the live zone state in Cloudflare.
  interval: 30m
