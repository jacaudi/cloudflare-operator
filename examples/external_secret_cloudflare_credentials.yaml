# External Secrets Operator → cloudflare-operator credentials
#
# Materializes the `cloudflare-credentials` Secret the operator reads (via the
# operator-level default OR a per-CR `spec.cloudflare` ref) from an external
# secret backend. Swap the `SecretStore` provider block for your backend
# (1Password Connect, Vault, AWS Secrets Manager, GCP Secret Manager, etc.) —
# the ExternalSecret below is provider-agnostic and only depends on the store
# being able to surface a Cloudflare API token and an account ID.
#
# Prerequisite: External Secrets Operator (≥ 0.9) installed in-cluster.
# See https://external-secrets.io.
---
# Backend wiring. Replace the provider block to match your external store.
# This example uses a generic placeholder — a real cluster picks ONE of:
#   provider.vault.{...}
#   provider.onepassword.{...}
#   provider.awssm.{...}
#   provider.gcpsm.{...}
# See https://external-secrets.io/latest/provider/ for the full list.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: cloudflare-secret-store
  namespace: cloudflare-system
spec:
  provider:
    # Replace this stanza with your real provider config. The fake provider
    # below is intentionally non-functional — ESO will refuse to use it
    # until you fill in a real one.
    fake:
      data:
        - key: cloudflare/api-token
          value: REPLACE_ME
        - key: cloudflare/account-id
          value: REPLACE_ME
---
# Pulls the token + accountID from the external store and writes a single
# Opaque Secret named `cloudflare-credentials` with the two keys the
# operator looks for by default (`token`, `accountID`).
#
# If you use a different external-store layout (e.g. one item per zone /
# environment), duplicate this ExternalSecret with different
# remoteRef.keys + a different target name; per-CR `spec.cloudflare` can
# then point each CR at its own Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-credentials
  namespace: cloudflare-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cloudflare-secret-store
    kind: SecretStore
  target:
    # Name the operator reads — must match `tokenSecretRef.name` /
    # `accountIDSecretRef.name` in your CRDs (or the operator-level default).
    name: cloudflare-credentials
    creationPolicy: Owner       # ESO owns the Secret; deletes follow.
    deletionPolicy: Retain      # Keep the Secret if the ExternalSecret is deleted.
    template:
      type: Opaque
  data:
    - secretKey: token          # Becomes data.token in the materialized Secret.
      remoteRef:
        key: cloudflare/api-token
    - secretKey: accountID      # Becomes data.accountID in the materialized Secret.
      remoteRef:
        key: cloudflare/account-id
